apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: Elasticsearch
    uid: elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    basicAuth: true
    basicAuthUser: elastic
    editable: false
    jsonData:
      index: '[wit-logs-]YYYY.MM.DD'
      interval: Daily
      esVersion: "8.13.0"
      timeField: "@timestamp"
    secureJsonData:
      basicAuthPassword: ${ELASTIC_PASSWORD}
