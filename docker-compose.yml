services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wit_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-wit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wit_secure_password_2024}
      - POSTGRES_DB=${POSTGRES_DB:-whatsapp_insight}
    volumes:
      - wit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wit_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wit_backend
    restart: unless-stopped
    ports:
      - "8020:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.gameron.me}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - MAX_AGENTS=${MAX_AGENTS:-20}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-wit}:${POSTGRES_PASSWORD:-wit_secure_password_2024}@postgres:5432/${POSTGRES_DB:-whatsapp_insight}
      - UPLOAD_DIR=/app/data/uploads
      - MEDIA_DIR=/app/data/media
      - DEBUG=${DEBUG:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-wit-jwt-secret-key-production-2024-min-32-chars}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@2024Secure!}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - SECRET_KEY=${SECRET_KEY:-wit-production-secret-key-change-me-2024-secure}
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:3020","http://localhost","http://frontend:3000","http://77.42.68.212:3020","http://77.42.68.212","https://transcriber.jurislaw.com.br"]
      - REDIS_URL=redis://redis:6379/0
      - CACHE_ENABLED=true
    volumes:
      - wit_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.wit_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fluentbit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ─── Frontend Next.js ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: wit_frontend
    restart: unless-stopped
    ports:
      - "3020:3000"
    environment:
      - NEXT_PUBLIC_API_URL=
      - BACKEND_URL=http://backend:8000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Fluent Bit ──────────────────────────────────────────────────
  fluentbit:
    image: fluent/fluent-bit:3.0
    container_name: wit_fluentbit
    restart: unless-stopped
    ports:
      - "24224:24224"
      - "24224:24224/udp"
      - "2020:2020"
    volumes:
      - ./logging/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./logging/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./logging/redact.lua:/fluent-bit/etc/redact.lua:ro
      - fluentbit_buffer:/fluent-bit/buffer
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2020/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Elasticsearch ───────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: wit_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.http.ssl.enabled=false
    volumes:
      - wit_esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Kibana ──────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: wit_kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  wit_data:
    driver: local
  wit_pgdata:
    driver: local
  wit_esdata:
    driver: local
  fluentbit_buffer:
    driver: local
