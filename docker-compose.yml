services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wit_postgres
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-whatsapp_insight}
    volumes:
      - wit_pgdata:/var/lib/postgresql/data
    networks:
      - wit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wit_redis
    restart: unless-stopped
    mem_limit: 128m
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["sh", "-eu", "-c", "test -n \"$${REDIS_PASSWORD}\"; exec redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    networks:
      - wit_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wit_backend
    restart: unless-stopped
    mem_limit: 2g
    expose:
      - "8000"
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: wit.backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.gameron.me}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - MAX_AGENTS=${MAX_AGENTS:-20}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whatsapp_insight}
      - UPLOAD_DIR=/app/data/uploads
      - MEDIA_DIR=/app/data/media
      - DEBUG=${DEBUG:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - SECRET_KEY=${SECRET_KEY}
      - RUN_DB_MIGRATIONS_ON_STARTUP=true
      - ENABLE_METRICS=true
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["http://localhost:3000","https://transcriber.jurislaw.com.br"]}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CACHE_ENABLED=true
    volumes:
      - wit_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - wit_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ─── Frontend Next.js ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: wit_frontend
    restart: unless-stopped
    mem_limit: 512m
    expose:
      - "3000"
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: wit.frontend
    environment:
      - NEXT_PUBLIC_API_URL=
      - BACKEND_URL=http://backend:8000
      - HOSTNAME=0.0.0.0
    networks:
      - wit_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Fluent Bit ──────────────────────────────────────────────────
  fluentbit:
    image: fluent/fluent-bit:3.0
    container_name: wit_fluentbit
    restart: unless-stopped
    mem_limit: 128m
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "127.0.0.1:24224:24224"
      - "127.0.0.1:24224:24224/udp"
    expose:
      - "2020"
    volumes:
      - ./logging/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./logging/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./logging/redact.lua:/fluent-bit/etc/redact.lua:ro
      - fluentbit_buffer:/fluent-bit/buffer
    networks:
      - wit_network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2020/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Elasticsearch ───────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: wit_elasticsearch
    restart: unless-stopped
    mem_limit: 1536m
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.http.ssl.enabled=false
    volumes:
      - wit_esdata:/usr/share/elasticsearch/data
    expose:
      - "9200"
    networks:
      - wit_network
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Kibana ──────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: wit_kibana
    restart: unless-stopped
    mem_limit: 512m
    expose:
      - "5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    networks:
      - wit_network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Nginx ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wit_nginx
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx-https.conf:ro
      - ./nginx/nginx-http.conf:/etc/nginx/templates/nginx-http.conf:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    environment:
      - NGINX_CONF_FILE=${NGINX_CONF_FILE:-nginx-http.conf}
    command: >
      /bin/sh -eu -c '
        cp /etc/nginx/templates/${NGINX_CONF_FILE} /etc/nginx/conf.d/default.conf;
        nginx -t;
        (
          while :; do
            sleep 6h & wait $${!};
            nginx -t && nginx -s reload;
          done
        ) &
        exec nginx -g "daemon off;"
      '
    networks:
      - wit_network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Certbot ─────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: wit_certbot
    restart: unless-stopped
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - wit_network
    depends_on:
      nginx:
        condition: service_started
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do
        if [ -f /etc/letsencrypt/live/$${APP_DOMAIN}/fullchain.pem ]; then
          certbot renew --webroot -w /var/www/certbot --quiet;
        fi;
        sleep 12h & wait $${!};
      done;'

  # ─── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: wit_prometheus
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - wit_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - wit_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: wit_grafana
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_METRICS_ENABLED=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - wit_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - wit_network
    depends_on:
      prometheus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Alertmanager ──────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: wit_alertmanager
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
    environment:
      - ALERTMANAGER_WEBHOOK_URL=${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9093}
      - ALERTMANAGER_WEBHOOK_USER=${ALERTMANAGER_WEBHOOK_USER:-}
      - ALERTMANAGER_WEBHOOK_PASSWORD=${ALERTMANAGER_WEBHOOK_PASSWORD:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat /etc/alertmanager/alertmanager.yml.tmpl | \
          sed "s|\$${ALERTMANAGER_WEBHOOK_URL}|$${ALERTMANAGER_WEBHOOK_URL}|g" | \
          sed "s|\$${ALERTMANAGER_WEBHOOK_USER}|$${ALERTMANAGER_WEBHOOK_USER}|g" | \
          sed "s|\$${ALERTMANAGER_WEBHOOK_PASSWORD}|$${ALERTMANAGER_WEBHOOK_PASSWORD}|g" \
          > /tmp/alertmanager.yml && \
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager
    networks:
      - wit_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Node Exporter ────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: wit_node_exporter
    restart: unless-stopped
    mem_limit: 64m
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - wit_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  wit_data:
    driver: local
  wit_pgdata:
    driver: local
  wit_esdata:
    driver: local
  fluentbit_buffer:
    driver: local
  certbot_data:
    driver: local
  certbot_certs:
    driver: local
  wit_prometheus_data:
    driver: local
  wit_grafana_data:
    driver: local

networks:
  wit_network:
    driver: bridge
