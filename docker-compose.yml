version: "3.9"

services:
  # ─── Backend FastAPI ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wit_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-http://host.docker.internal:1337}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - MAX_AGENTS=${MAX_AGENTS:-20}
      - DATABASE_URL=sqlite+aiosqlite:///./data/whatsapp_insight.db
      - UPLOAD_DIR=/app/data/uploads
      - MEDIA_DIR=/app/data/media
      - DEBUG=${DEBUG:-false}
      - ALLOWED_ORIGINS=["http://localhost:3000","http://frontend:3000"]
    volumes:
      - wit_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend Next.js ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wit_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  wit_data:
    driver: local
