# ─── JSON Log Format ──────────────────────────────────────────────────────────
log_format json_structured escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"level":"INFO",'
        '"service":"wit-nginx",'
        '"event":"http.access",'
        '"message":"$request",'
        '"trace_id":"$trace_id",'
        '"request_id":"$request_id_fallback",'
        '"http":{'
            '"method":"$request_method",'
            '"url":"$uri",'
            '"status_code":$status,'
            '"duration_ms":$request_time,'
            '"request_size":$request_length,'
            '"response_size":$bytes_sent'
        '},'
        '"user":{'
            '"ip":"$remote_addr",'
            '"user_agent":"$http_user_agent"'
        '},'
        '"upstream":{'
            '"addr":"$upstream_addr",'
            '"response_time":"$upstream_response_time",'
            '"status":"$upstream_status"'
        '}'
    '}';

access_log /var/log/nginx/access.log json_structured;
error_log /var/log/nginx/error.log warn;

# ─── Trace/Request ID Fallback ───────────────────────────────────────────────
map $http_x_trace_id $trace_id {
    default $http_x_trace_id;
    "" $request_id;
}

map $http_x_request_id $request_id_fallback {
    default $http_x_request_id;
    "" $request_id;
}

# ─── Rate Limiting ────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# ─── Gzip ────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;

# ─── Upstream ────────────────────────────────────────────────────────────────
upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name transcriber.jurislaw.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main Server (HTTPS) ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name transcriber.jurislaw.com.br;

    # ── SSL Configuration ────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/transcriber.jurislaw.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transcriber.jurislaw.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Hide server info ────────────────────────────────────────────────────
    server_tokens off;

    # ── Client body size (para uploads) ──────────────────────────────────────
    client_max_body_size 500M;

    # ── ACME challenge ───────────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Auth endpoints (rate limited) ────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-ID $trace_id;
        proxy_set_header X-Request-ID $request_id_fallback;
    }

    # ── Upload endpoint (rate limited) ───────────────────────────────────────
    location /api/conversations/upload {
        limit_req zone=upload_limit burst=2 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-ID $trace_id;
        proxy_set_header X-Request-ID $request_id_fallback;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket (progress real-time) ──────────────────────────────────────
    location /api/ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-ID $trace_id;
        proxy_set_header X-Request-ID $request_id_fallback;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API (general rate limit) ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-ID $trace_id;
        proxy_set_header X-Request-ID $request_id_fallback;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # SSE/Streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
