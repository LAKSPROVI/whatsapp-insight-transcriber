# ─── Bootstrap HTTP config used automatically before the first certificate ───
# This file keeps the application reachable over HTTP and serves ACME
# challenges until the initial Let's Encrypt certificate is issued.

log_format json_structured escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"level":"INFO",'
        '"service":"wit-nginx",'
        '"event":"http.access",'
        '"message":"$request",'
        '"trace_id":"$trace_id",'
        '"request_id":"$request_id_fallback",'
        '"http":{'
            '"method":"$request_method",'
            '"url":"$uri",'
            '"status_code":$status,'
            '"duration_ms":$request_time,'
            '"request_size":$request_length,'
            '"response_size":$bytes_sent'
        '},'
        '"user":{'
            '"ip":"$remote_addr",'
            '"user_agent":"$http_user_agent"'
        '},'
        '"upstream":{'
            '"addr":"$upstream_addr",'
            '"response_time":"$upstream_response_time",'
            '"status":"$upstream_status"'
        '}'
    '}';

access_log /var/log/nginx/access.log json_structured;
error_log /var/log/nginx/error.log warn;

map $http_x_trace_id $trace_id {
    default $http_x_trace_id;
    "" $request_id;
}

map $http_x_request_id $request_id_fallback {
    default $http_x_request_id;
    "" $request_id;
}

# ─── Upstream ────────────────────────────────────────────────────────────────
upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# ─── HTTP Server (for initial certbot setup) ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name transcriber.jurislaw.com.br;

    server_tokens off;
    client_max_body_size 500M;

    # ── ACME challenge for certbot ───────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Auth endpoints ───────────────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── WebSocket ────────────────────────────────────────────────────────────
    location /api/ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
