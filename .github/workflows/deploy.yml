name: Deploy to Hetzner

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forcar rebuild completo'
        required: false
        default: 'false'
        type: boolean
      skip_tests:
        description: 'Pular testes (emergencia)'
        required: false
        default: 'false'
        type: boolean

env:
  HETZNER_HOST: 77.42.68.212
  HETZNER_USER: root
  APP_DIR: /opt/whatsapp-insight-transcriber
  APP_DOMAIN: transcriber.jurislaw.com.br

jobs:
  # ─── Job 1: Testes ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias backend
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Executar testes backend
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          ANTHROPIC_API_KEY: "test-key-for-ci"
          JWT_SECRET_KEY: "test-jwt-secret-minimum-32-characters-long!!"
          SECRET_KEY: "test-secret-key-minimum-16-chars"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "TestPassword123!"
        run: |
          python -m pytest tests/ -v --tb=short -x -q 2>&1 || {
            echo "::error::Testes backend falharam! Deploy cancelado."
            exit 1
          }

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run lint 2>&1 || {
            echo "::warning::Frontend lint encontrou problemas (nao bloqueante)"
          }

  # ─── Job 2: Deploy ──────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || github.event.inputs.skip_tests == 'true') }}
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      # ─── Checkout ──────────────────────────────────────────────
      - name: Checkout codigo
        uses: actions/checkout@v4

      # ─── Configurar SSH ────────────────────────────────────────
      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Adicionar host ao known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.HETZNER_HOST }} >> ~/.ssh/known_hosts

      # ─── Verificar Servidor ────────────────────────────────────
      - name: Verificar conexao SSH
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} "echo 'SSH OK' && uname -a && docker --version && docker compose version"

      # ─── Enviar Codigo via rsync ───────────────────────────────
      - name: Sincronizar codigo para o servidor
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='venv' \
            --exclude='.env' \
            --exclude='uploads/' \
            --exclude='media/' \
            --exclude='*.db' \
            ./ ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }}:${{ env.APP_DIR }}/

      # ─── Configurar .env no servidor ──────────────────────────
      - name: Configurar variaveis de ambiente
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            cd ${{ env.APP_DIR }}
            
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
            echo "ANTHROPIC_BASE_URL=${{ secrets.ANTHROPIC_BASE_URL }}" >> .env
            echo "ANTHROPIC_DIRECT_URL=https://api.anthropic.com" >> .env
            echo "CLAUDE_MODEL=claude-opus-4-6" >> .env
            echo "CLAUDE_MODEL_CHAT=claude-opus-4-6" >> .env
            echo "CLAUDE_MODEL_ANALYSIS=claude-sonnet-4-20250514" >> .env
            echo "CLAUDE_MODEL_SIMPLE=claude-haiku-4-20250414" >> .env
            echo "MAX_AGENTS=20" >> .env
            echo "DATABASE_URL=postgresql+asyncpg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}" >> .env
            echo "RUN_DB_MIGRATIONS_ON_STARTUP=true" >> .env
            echo "UPLOAD_DIR=/app/data/uploads" >> .env
            echo "MEDIA_DIR=/app/data/media" >> .env
            echo "DEBUG=false" >> .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
            echo "JWT_ALGORITHM=HS256" >> .env
            echo "JWT_EXPIRATION_MINUTES=1440" >> .env
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            echo "ALLOW_REGISTRATION=false" >> .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
            echo "ELASTIC_PASSWORD=${{ secrets.ELASTIC_PASSWORD }}" >> .env
            echo "GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}" >> .env
            echo "GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" >> .env
            echo "APP_DOMAIN=${{ env.APP_DOMAIN }}" >> .env
            echo "LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}" >> .env
            echo "NGINX_CONF_FILE=nginx-http.conf" >> .env
            echo 'ALLOWED_ORIGINS=["http://${{ env.HETZNER_HOST }}","http://${{ env.HETZNER_HOST }}:3020","https://${{ env.APP_DOMAIN }}","http://frontend:3000","http://localhost:3000"]' >> .env
            echo "ALERTMANAGER_WEBHOOK_URL=${{ secrets.ALERTMANAGER_WEBHOOK_URL }}" >> .env
            echo "ALERTMANAGER_WEBHOOK_USER=${{ secrets.ALERTMANAGER_WEBHOOK_USER }}" >> .env
            echo "ALERTMANAGER_WEBHOOK_PASSWORD=${{ secrets.ALERTMANAGER_WEBHOOK_PASSWORD }}" >> .env
            echo "Variaveis de ambiente configuradas"
          EOF

      # ─── Pre-deploy Backup ─────────────────────────────────────
      - name: Backup database before deploy
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            cd ${{ env.APP_DIR }}
            mkdir -p /opt/backups/wit
            
            # Backup PostgreSQL
            docker compose exec -T postgres sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' 2>/dev/null | gzip > "/opt/backups/wit/pre_deploy_$(date +%Y%m%d_%H%M%S).sql.gz" || echo "No existing database to backup (first deploy?)"
            
            # Limpar backups antigos (manter 30 dias)
            find /opt/backups/wit -name "*.gz" -mtime +30 -delete 2>/dev/null || true
          EOF

      # ─── Salvar imagens atuais para rollback ───────────────────
      - name: Tag imagens atuais para rollback
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            cd ${{ env.APP_DIR }}
            
            # Tagear imagens atuais como :previous para rollback
            BACKEND_IMG=$(docker compose images backend -q 2>/dev/null | head -1)
            FRONTEND_IMG=$(docker compose images frontend -q 2>/dev/null | head -1)
            
            if [ -n "$BACKEND_IMG" ]; then
              docker tag "$BACKEND_IMG" wit-backend:previous 2>/dev/null || true
              echo "Backend image tagged for rollback: $BACKEND_IMG"
            fi
            
            if [ -n "$FRONTEND_IMG" ]; then
              docker tag "$FRONTEND_IMG" wit-frontend:previous 2>/dev/null || true
              echo "Frontend image tagged for rollback: $FRONTEND_IMG"
            fi
          EOF

      # ─── Deploy com Docker Compose ────────────────────────────
      - name: Deploy com Docker Compose
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            set -e
            cd ${{ env.APP_DIR }}
            
            echo "Criando diretorios de dados..."
            mkdir -p data/uploads data/media
            
            echo "Buildando e iniciando containers base..."
            docker compose up -d --build postgres redis elasticsearch fluentbit

            echo "Aguardando deps (postgres/redis)..."
            sleep 10

            echo "Buildando imagens de backend e frontend..."
            docker compose build backend frontend

            echo "Rolling update: backend..."
            docker compose up -d --no-deps backend

            echo "Rolling update: frontend..."
            docker compose up -d --no-deps frontend

            echo "Iniciando nginx em modo bootstrap HTTP..."
            docker compose up -d nginx

            echo "Aguardando nginx bootstrap..."
            for i in $(seq 1 12); do
              if docker compose exec -T nginx wget --spider -q http://127.0.0.1/nginx-health; then
                echo "Nginx bootstrap pronto na tentativa $i"
                break
              fi
              echo "Tentativa $i/12 - aguardando nginx..."
              sleep 5
            done

            echo "Aguardando backend iniciar..."
            sleep 10
            
            echo "Testando health do backend..."
            BACKEND_HEALTHY=false
            for i in $(seq 1 12); do
              if docker compose exec -T backend curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
                echo "Backend healthy na tentativa $i"
                BACKEND_HEALTHY=true
                break
              fi
              echo "Tentativa $i/12 - aguardando..."
              sleep 10
            done
            
            if [ "$BACKEND_HEALTHY" = false ]; then
              echo "ERRO: Backend failed to become healthy"
              docker compose logs backend --tail=50
              exit 1
            fi
            
            echo "Emitindo certificado inicial se necessario..."
            sh scripts/init-ssl.sh

            echo "Alternando para nginx HTTPS..."
            sed -i "s/^NGINX_CONF_FILE=.*/NGINX_CONF_FILE=nginx-https.conf/" .env
            docker compose up -d --no-deps nginx certbot

            echo "Iniciando servicos de monitoramento..."
            docker compose up -d prometheus grafana alertmanager node-exporter kibana

            echo "Validando frontend via container..."
            if ! docker compose exec -T frontend wget --spider -q http://127.0.0.1:3000; then
              echo "WARN: Frontend pode ainda estar inicializando"
            fi
            
            echo ""
            echo "Status dos containers:"
            docker compose ps
            
            echo "Deploy concluido!"
          EOF

      # ─── Rollback em caso de falha ─────────────────────────────
      - name: Rollback em caso de falha
        if: failure()
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            cd ${{ env.APP_DIR }}
            echo "ROLLBACK: Tentando restaurar versao anterior..."
            
            # Verificar se existem imagens previous
            if docker image inspect wit-backend:previous >/dev/null 2>&1; then
              echo "Restaurando backend anterior..."
              docker compose stop backend frontend
              
              docker compose up -d --no-deps backend frontend
              
              echo "Aguardando backend restaurado..."
              sleep 15
              
              if docker compose exec -T backend curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
                echo "ROLLBACK bem-sucedido: backend anterior esta healthy"
              else
                echo "ROLLBACK FALHOU: backend anterior tambem nao esta healthy"
                docker compose logs backend --tail=30
              fi
            else
              echo "Sem imagem anterior para rollback (primeiro deploy?)"
              echo "Logs dos containers:"
              docker compose logs backend frontend --tail=50
            fi
            
            echo "Status final:"
            docker compose ps
          EOF

      # ─── Limpeza de imagens Docker ─────────────────────────────
      - name: Limpar imagens Docker antigas
        if: success()
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            echo "Limpando imagens Docker orfas e cache..."
            docker image prune -f
            docker builder prune -f --keep-storage=2GB
            
            # Remover imagens de rollback (deploy foi sucesso)
            docker rmi wit-backend:previous wit-frontend:previous 2>/dev/null || true
            
            echo "Espaco em disco apos limpeza:"
            df -h / | tail -1
          EOF

      # ─── Verificacao Final ────────────────────────────────────
      - name: Verificacao final
        if: success()
        run: |
          sleep 10
          echo "Verificando HTTPS redirect..."
          curl -sI http://${{ env.APP_DOMAIN }} | head -5
          
          echo "Verificando nginx health..."
          curl -fsS https://${{ env.APP_DOMAIN }}/nginx-health
          
          echo "Verificando API health..."
          curl -fsS https://${{ env.APP_DOMAIN }}/api/health
          
          echo ""
          echo "Frontend: https://${{ env.APP_DOMAIN }}"
          echo "API Docs: https://${{ env.APP_DOMAIN }}/api/docs"

      # ─── Garantir cron de backup ───────────────────────────────
      - name: Configurar backup diario automatico
        if: success()
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            # Configurar cron de backup diario as 3:00 AM
            CRON_JOB="0 3 * * * cd /opt/whatsapp-insight-transcriber && sh scripts/backup.sh >> /var/log/wit-backup.log 2>&1"
            
            # Adicionar apenas se nao existir
            (crontab -l 2>/dev/null | grep -v "wit.*backup" ; echo "$CRON_JOB") | crontab -
            
            echo "Cron de backup configurado:"
            crontab -l | grep backup
          EOF

      # ─── Backup Offsite (Hetzner Storage Box ou rsync remoto) ─
      - name: Configurar backup offsite
        if: success()
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            cat > /opt/whatsapp-insight-transcriber/scripts/backup-offsite.sh <<'SCRIPT'
            #!/bin/sh
            set -eu
            BACKUP_DIR="/opt/backups/wit"
            OFFSITE_DIR="/opt/backups/wit-offsite"
            RETENTION_DAYS=14
            mkdir -p "$OFFSITE_DIR"
            find "$BACKUP_DIR" -name "*.gz" -mtime -1 -exec cp -n {} "$OFFSITE_DIR/" \;
            find "$OFFSITE_DIR" -name "*.gz" -mtime +"$RETENTION_DAYS" -delete 2>/dev/null || true
            echo "Backup offsite atualizado"
          SCRIPT
            chmod +x /opt/whatsapp-insight-transcriber/scripts/backup-offsite.sh
            OFFSITE_CRON="0 4 * * * /opt/whatsapp-insight-transcriber/scripts/backup-offsite.sh >> /var/log/wit-backup-offsite.log 2>&1"
            (crontab -l 2>/dev/null | grep -v "backup-offsite" ; echo "$OFFSITE_CRON") | crontab -
            echo "Backup offsite configurado"
          EOF

      # ─── Notificacao de Falha ─────────────────────────────────
      - name: Deploy falhou - Coletar logs
        if: failure()
        run: |
          echo "Deploy falhou! Coletando logs de diagnostico..."
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} "cd ${{ env.APP_DIR }} && docker compose ps && echo '---' && docker compose logs nginx certbot backend frontend --tail=100" || true
