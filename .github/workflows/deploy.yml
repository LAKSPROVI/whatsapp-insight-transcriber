name: 🚀 Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forçar rebuild completo'
        required: false
        default: 'false'
        type: boolean

env:
  HETZNER_HOST: 77.42.68.212
  HETZNER_USER: root
  APP_DIR: /opt/whatsapp-insight-transcriber

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ─── Checkout ──────────────────────────────────────────────
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # ─── Configurar SSH ────────────────────────────────────────
      - name: 🔑 Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: 📋 Adicionar host ao known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.HETZNER_HOST }} >> ~/.ssh/known_hosts

      # ─── Verificar Servidor ────────────────────────────────────
      - name: 🔍 Verificar conexão SSH
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} "echo '✅ SSH OK' && uname -a && docker --version && docker compose version"

      # ─── Enviar Código via rsync ───────────────────────────────
      - name: 📤 Sincronizar código para o servidor
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='venv' \
            --exclude='.env' \
            --exclude='uploads/' \
            --exclude='media/' \
            --exclude='*.db' \
            ./ ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }}:${{ env.APP_DIR }}/

      # ─── Configurar .env no servidor ──────────────────────────
      - name: ⚙️ Configurar variáveis de ambiente
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            cd ${{ env.APP_DIR }}
            
            # Criar .env se não existir
            if [ ! -f .env ]; then
              echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
              echo "ANTHROPIC_BASE_URL=${{ secrets.ANTHROPIC_BASE_URL || 'http://localhost:1337' }}" >> .env
              echo "CLAUDE_MODEL=claude-opus-4-6" >> .env
              echo "MAX_AGENTS=20" >> .env
              echo "DATABASE_URL=sqlite+aiosqlite:///./data/whatsapp_insight.db" >> .env
              echo "UPLOAD_DIR=/app/data/uploads" >> .env
              echo "MEDIA_DIR=/app/data/media" >> .env
              echo "DEBUG=false" >> .env
              echo "SECRET_KEY=wit-production-secret-key-change-me-2024-secure" >> .env
              echo "JWT_SECRET_KEY=wit-jwt-secret-key-production-2024-min-32-chars" >> .env
              echo "JWT_ALGORITHM=HS256" >> .env
              echo "JWT_EXPIRATION_MINUTES=1440" >> .env
              echo "ADMIN_USERNAME=admin" >> .env
              echo "ADMIN_PASSWORD=Admin@2024Secure!" >> .env
              echo "ALLOW_REGISTRATION=false" >> .env
              echo "ALLOWED_ORIGINS=[\"http://${{ env.HETZNER_HOST }}\",\"http://${{ env.HETZNER_HOST }}:3020\",\"https://transcriber.jurislaw.com.br\"]" >> .env
              echo "✅ .env criado com todas as variáveis"
            else
              # Atualizar API key
              sed -i "s/^ANTHROPIC_API_KEY=.*/ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}/" .env
              # Garantir que JWT_SECRET_KEY existe
              grep -q "^JWT_SECRET_KEY=" .env || echo "JWT_SECRET_KEY=wit-jwt-secret-key-production-2024-min-32-chars" >> .env
              # Garantir que SECRET_KEY existe
              grep -q "^SECRET_KEY=" .env || echo "SECRET_KEY=wit-production-secret-key-change-me-2024-secure" >> .env
              # Garantir que ADMIN_PASSWORD existe
              grep -q "^ADMIN_PASSWORD=" .env || echo "ADMIN_PASSWORD=Admin@2024Secure!" >> .env
              # Garantir que ADMIN_USERNAME existe
              grep -q "^ADMIN_USERNAME=" .env || echo "ADMIN_USERNAME=admin" >> .env
              echo "✅ .env atualizado"
            fi
          EOF

      # ─── Deploy com Docker Compose ────────────────────────────
      - name: 🐳 Fazer deploy com Docker Compose
        run: |
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOF'
            set -e
            cd ${{ env.APP_DIR }}
            
            echo "📦 Criando diretórios de dados..."
            mkdir -p data/uploads data/media
            
            echo "🔨 Buildando imagens Docker..."
            docker compose build --no-cache
            
            echo "🚀 Iniciando backend..."
            docker compose up -d backend
            
            echo "⏳ Aguardando backend iniciar..."
            sleep 15
            
            echo "📋 Logs do backend:"
            docker compose logs backend --tail=80
            
            echo ""
            echo "📋 Testando health do backend..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8020/api/health > /dev/null 2>&1; then
                echo "✅ Backend healthy na tentativa $i"
                break
              fi
              echo "⏳ Tentativa $i/12 - aguardando..."
              sleep 10
            done
            
            echo ""
            echo "🚀 Iniciando frontend..."
            docker compose up -d frontend
            sleep 10
            
            echo ""
            echo "📋 Status dos containers:"
            docker compose ps
            
            # Testar backend
            curl -f http://localhost:8020/api/health && echo "✅ Backend OK" || echo "⚠️ Backend ainda iniciando..."
            
            echo "🎉 Deploy concluído!"
          EOF

      # ─── Verificação Final ────────────────────────────────────
      - name: ✅ Verificação final
        run: |
          sleep 10
          curl -f http://${{ env.HETZNER_HOST }}:8020/api/health && echo "✅ Backend respondendo!" || echo "⚠️ Backend pode estar ainda iniciando"
          echo "🌐 Frontend: http://${{ env.HETZNER_HOST }}:3020"
          echo "📚 API Docs: http://${{ env.HETZNER_HOST }}:8020/api/docs"

      # ─── Notificação de Falha ─────────────────────────────────
      - name: ❌ Deploy falhou
        if: failure()
        run: |
          echo "Deploy falhou! Verifique os logs acima."
          ssh ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} "cd ${{ env.APP_DIR }} && docker compose logs --tail=50" || true
