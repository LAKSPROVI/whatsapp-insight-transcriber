[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    storage.path  /fluent-bit/buffer/
    Buffer_Size   10MB

# ─── Inputs ──────────────────────────────────────────────────────

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    Tag           docker.*
    Buffer_Size   10MB

[INPUT]
    Name          tail
    Path          /var/log/containers/*.log
    Tag           container.*
    Parser        docker
    Refresh_Interval 5
    Mem_Buf_Limit 10MB
    Skip_Long_Lines On
    DB            /fluent-bit/buffer/tail_pos.db

# ─── Filters ─────────────────────────────────────────────────────

[FILTER]
    Name          modify
    Match         *
    Add           cluster wit-production
    Add           collected_at ${HOSTNAME}

[FILTER]
    Name          lua
    Match         *
    script        /fluent-bit/etc/redact.lua
    call          redact_sensitive

# ─── Outputs ─────────────────────────────────────────────────────

[OUTPUT]
    Name          es
    Match         *
    Host          elasticsearch
    Port          9200
    Index         wit-logs-%Y.%m.%d
    Logstash_Format Off
    Suppress_Type_Name On
    Retry_Limit   5
    tls           Off
    HTTP_User     elastic
    HTTP_Passwd   ${ELASTIC_PASSWORD:-changeme}

[OUTPUT]
    Name          file
    Match         *
    Path          /fluent-bit/buffer/
    File          backup.log
    Format        plain
