[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    storage.path  /fluent-bit/buffer/

# ─── Inputs ──────────────────────────────────────────────────────

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    Tag           docker.*
    Buffer_Chunk_Size 1MB
    Buffer_Max_Size   10MB

# ─── Filters ─────────────────────────────────────────────────────

[FILTER]
    Name          modify
    Match         *
    Add           cluster wit-production
    Add           collected_at ${HOSTNAME}

[FILTER]
    Name          lua
    Match         *
    script        /fluent-bit/etc/redact.lua
    call          redact_sensitive

# ─── Outputs ─────────────────────────────────────────────────────

[OUTPUT]
    Name          es
    Match         *
    Host          elasticsearch
    Port          9200
    Index         wit-logs
    Logstash_Format On
    Logstash_Prefix wit-logs
    Suppress_Type_Name On
    Retry_Limit   False
    tls           Off
    HTTP_User     elastic
    HTTP_Passwd   ${ELASTIC_PASSWORD}
    net.keepalive On
    net.keepalive_idle_timeout 10

[OUTPUT]
    Name          file
    Match         *
    Path          /fluent-bit/buffer/
    File          backup.log
    Format        plain
